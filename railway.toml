# Railway deployment config — AnnotateOS v4

[build]
builder = "DOCKER"
dockerfile = "Dockerfile"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[env]
PORT = "5000"
NODE_ENV = "production"
