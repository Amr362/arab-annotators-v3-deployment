# Railway deployment config — AnnotateOS v4

[build]
builder = "docker"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 10
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[env]
PORT = "5000"
NODE_ENV = "production"
