version: "3.8"

services:
  # PostgreSQL Database for App and Label Studio
  db:
    image: postgres:15-alpine
    container_name: arab-annotators-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      timeout: 20s
      retries: 10
    networks:
      - arab-annotators-network

  # Label Studio
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: arab-annotators-label-studio
    environment:
      DJANGO_DB: default
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK: "true"
    ports:
      - "8080:8080"
    volumes:
      - label_studio_data:/label-studio/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - arab-annotators-network

  # Arab Annotators Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arab-annotators-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}
      OWNER_NAME: ${OWNER_NAME}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL}
      VITE_ANALYTICS_ENDPOINT: ${VITE_ANALYTICS_ENDPOINT}
      VITE_ANALYTICS_WEBSITE_ID: ${VITE_ANALYTICS_WEBSITE_ID}
      VITE_APP_TITLE: Arab Annotators
      VITE_APP_LOGO: /logo.png
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      label-studio:
        condition: service_started
    volumes:
      - ./:/app
    networks:
      - arab-annotators-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: arab-annotators-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
      - label-studio
    networks:
      - arab-annotators-network

volumes:
  postgres_data:
  label_studio_data:

networks:
  arab-annotators-network:
    driver: bridge
